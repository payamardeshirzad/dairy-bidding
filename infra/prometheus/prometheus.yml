global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # .NET services running on the host (accessed from Docker via host.docker.internal)
  - job_name: "api-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5000"]
    relabel_configs:
      - target_label: service
        replacement: api-gateway

  - job_name: "identity-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5245"]
    relabel_configs:
      - target_label: service
        replacement: identity-service

  - job_name: "auction-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5255"]
    relabel_configs:
      - target_label: service
        replacement: auction-service

  - job_name: "bidding-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:5170"]
    relabel_configs:
      - target_label: service
        replacement: bidding-service